<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
<defs>
    <!-- Degradado de fondo profundo (Deep Space) -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020617" />
      <stop offset="100%" style="stop-color:#1e40af" />
    </linearGradient>
    
    <!-- Efecto de Cristal Esmerilado (Frosted Glass) -->
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.05" />
    </linearGradient>

    <!-- Resplandor de la punta (Glow) -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Fondo principal con esquinas ultra-suaves -->
  <rect width="512" height="512" rx="140" fill="url(#bg)" />

  <!-- ÁREA DE ACCIÓN: La placa de cristal flotante -->
  <rect x="80" y="220" width="352" height="200" rx="30" fill="url(#glass)" stroke="white" stroke-width="1.5" stroke-opacity="0.3" />
  
  <!-- El Trazo: No es una línea, es un haz de luz -->
  <path d="M120 360 c40-40 90 60 140-30 s80-50 120-10" 
        stroke="#60a5fa" stroke-width="28" stroke-linecap="round" fill="none" filter="url(#glow)" opacity="0.8" />

  <!-- LA PLUMA: Diseño futurista "Titanium Edition" -->
  <g transform="translate(380, 240) rotate(-20)">
    <!-- Cuerpo de la pluma con degradado metálico -->
    <rect x="-18" y="-180" width="36" height="180" rx="18" fill="#e2e8f0" />
    <!-- Grip de goma oscuro -->
    <rect x="-18" y="-60" width="36" height="40" fill="#334155" />
    <!-- Cono de la punta -->
    <path d="M-18 -20 L0 50 L18 -20 Z" fill="#94a3b8" />
    <!-- Punta activa de luz -->
    <circle cx="0" cy="50" r="8" fill="#60a5fa" filter="url(#glow)" />
    <!-- Reflejo de luz en el cuerpo de la pluma -->
    <rect x="-4" y="-160" width="8" height="100" rx="4" fill="white" opacity="0.4" />
  </g>
</svg>